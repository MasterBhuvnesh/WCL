<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Your Feedback</title>
</head>
<body style="margin:0; padding:0; background-color:#ffffff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:48px 24px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;">

          <!-- Wordmark -->
          <tr>
            <td style="padding-bottom:28px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td valign="middle">
                    <img src="https://rbuexam.in/icon.png" alt="RBUExam.in" width="30" height="30" style="display:block; border:0;" />
                  </td>
                  <td valign="middle" style="padding-left:10px; font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif; font-size:17px; font-weight:600; letter-spacing:-0.02em; color:#171717;">
                    RBUExam.in
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="border-top:1px solid #e5e5e5; padding-bottom:28px;"></td>
          </tr>

          <!-- Body copy -->
          <tr>
            <td style="font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif; font-size:15px; line-height:1.7; color:#404040; padding-bottom:8px;">
              Hi there,
            </td>
          </tr>
          <tr>
            <td style="font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif; font-size:15px; line-height:1.7; color:#404040; padding-bottom:8px;">
              Thanks for taking your exam on RBUExam.in. We would love to hear
              how the platform worked for you.
            </td>
          </tr>
          <tr>
            <td style="font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif; font-size:15px; line-height:1.7; color:#404040; padding-bottom:28px;">
              It is six quick questions and takes under a minute.
            </td>
          </tr>

          <!-- CTA button -->
          <tr>
            <td style="padding-bottom:32px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="background-color:#4185f4; border-radius:10px;">
                    <a
                      href="https://forms.gle/QwF7Psrf3J2Kqjsx5"
                      target="_blank"
                      rel="noopener"
                      style="display:inline-block; padding:13px 36px; font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif; font-size:15px; font-weight:500; color:#ffffff; text-decoration:none; border-radius:10px;"
                    >Share your feedback</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Sign-off -->
          <tr>
            <td style="font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif; font-size:15px; line-height:1.7; color:#404040; padding-bottom:36px;">
              Thanks,<br />
              Built with care by
              <a href="https://www.linkedin.com/in/viviandemello/" target="_blank" rel="noopener" style="color:#4185f4; font-weight:500;">Vivian</a>
              and
              <a href="https://www.linkedin.com/in/bhuvneshverma/" target="_blank" rel="noopener" style="color:#4185f4; font-weight:500;">Bhuvnesh</a>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
