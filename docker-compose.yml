services:
  postgres:
    image: postgres:16-alpine
    container_name: wcl-postgres
    environment:
      POSTGRES_USER: wcl
      POSTGRES_PASSWORD: wcl
      POSTGRES_DB: wcl
    ports:
      - "5432:5432"
    volumes:
      - wcl-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wcl -d wcl"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wcl-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage for question images (Floci emulator locally;
  # swap for real S3 via env vars in production).
  floci:
    image: floci/floci:latest
    container_name: wcl-floci
    ports:
      - "4566:4566"
    volumes:
      - wcl-floci-data:/app/data

  # --- Local observability (optional) -------------------------------------
  # Start with: docker compose --profile obs up -d
  # Grafana: http://localhost:3001 (admin/admin). Prometheus scrapes the API
  # running on the host via `bun run dev`; set METRICS_TOKEN=local-dev-token
  # in app/api/.env. Loki is a stub (no log shipping in dev; the log panels
  # show "no data").
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: wcl-prometheus
    profiles: [obs]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/local/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - host.docker.internal:host-gateway

  # Feeds the host CPU/memory panels. On Docker Desktop this reports the
  # Docker VM (WSL2), not the Windows host itself.
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: wcl-node-exporter
    profiles: [obs]
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    pid: host

  loki:
    image: grafana/loki:3.4.2
    container_name: wcl-loki
    profiles: [obs]
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro

  grafana:
    image: grafana/grafana:11.6.1
    container_name: wcl-grafana
    profiles: [obs]
    volumes:
      - ./observability/local/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000" # 3000 clashes with Next dev servers

volumes:
  wcl-pgdata:
  wcl-floci-data:
