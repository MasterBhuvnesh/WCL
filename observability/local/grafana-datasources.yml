# Local-dev Grafana datasources. The uids match the production provisioning
# so the dashboards in observability/dashboards/ work unchanged. Loki runs
# only as a stub locally (no Alloy; dev logs are pretty-printed, not JSON),
# so log panels show "no data".
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: PBFA97CFB590B2093
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: P8E80F9AEF21F6940
    access: proxy
    url: http://loki:3100
