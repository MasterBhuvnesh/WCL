# Grafana provisioned datasources. The read-only RDS Postgres datasource
# (audit_logs/results dashboards) is a follow-up: it first needs a read-only
# user created on RDS.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
