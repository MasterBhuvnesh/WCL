# Backend EC2 stack: API + watchtower.
# TLS and the api.rbuexam.in hostname are handled by the shared AWS
# application load balancer (target group wcl-api, port 4000).
#
# Usage on the instance (see docs/DEPLOY_BACKEND.md):
#   cp .env.prod.backend.example .env.prod.backend   # then fill in real values
#   docker compose -f docker-compose.backend.yml up -d

services:
  api:
    image: ${DOCKERHUB_USER:-bhuvneshverma}/wclapi:latest
    restart: unless-stopped
    env_file: .env.prod.backend
    ports:
      - "4000:4000"
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 300
